# Clash Verge Rev — Rules Enhancement (prepend)
# Applied to the active remote profile as a "rules" chain.
#
# Traffic splitting is handled by the subscription template (mihomo-ru-split.yaml).
# This override only adds Mac-specific direct routes.
#
# After any config reload, verify mode is "rule" not "global":
#   curl -s --unix-socket /tmp/verge/verge-mihomo.sock http://localhost/configs \
#     | python3 -c "import sys,json; print(json.load(sys.stdin)['mode'])"

prepend:
  # VPS — direct to avoid double VPN hop (Mac → VPN → VPS becomes Mac → VPS)
  - IP-CIDR,168.100.11.130/32,DIRECT
  - IP-CIDR,64.111.92.2/32,DIRECT

append: []

delete: []
