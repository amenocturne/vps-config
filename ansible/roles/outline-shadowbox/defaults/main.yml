---
# Outline Shadowbox (Shadowsocks VPN) defaults

outline_directory: "/opt/outline"
outline_state_directory: "/opt/outline/persisted-state"
outline_image: "quay.io/outline/shadowbox:stable"

# Management API
outline_api_port: 61779
outline_api_prefix: ""

# Shadowsocks port (configured inside Outline, must match persisted state)
outline_ss_port: 14685

# Self-signed TLS certificates (generated by Outline install script)
outline_cert_file: "/opt/outline/persisted-state/shadowbox-selfsigned.crt"
outline_key_file: "/opt/outline/persisted-state/shadowbox-selfsigned.key"

# Watchtower for auto-updating Outline
outline_watchtower_enabled: true
outline_watchtower_image: "containrrr/watchtower:latest"
outline_watchtower_interval: 3600
