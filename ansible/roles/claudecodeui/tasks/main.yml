---
- name: Install NodeSource GPG key
  shell: |
    curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
  args:
    creates: /usr/share/keyrings/nodesource.gpg

- name: Add NodeSource repository
  copy:
    content: "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ cloudcli_node_major }}.x nodistro main"
    dest: /etc/apt/sources.list.d/nodesource.list
    mode: '0644'

- name: Install Node.js, Python, and build dependencies
  apt:
    name:
      - nodejs
      - build-essential
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: true

- name: Install uv (Python package manager)
  shell: curl -LsSf https://astral.sh/uv/install.sh | sh
  args:
    creates: /root/.local/bin/uv
  environment:
    UV_INSTALL_DIR: /usr/local/bin

- name: Create cloudcli system user
  user:
    name: "{{ cloudcli_user }}"
    system: true
    shell: /bin/bash
    home: "/home/{{ cloudcli_user }}"
    create_home: true

- name: Create application directory
  file:
    path: "{{ cloudcli_directory }}"
    state: directory
    owner: "{{ cloudcli_user }}"
    group: "{{ cloudcli_user }}"
    mode: '0755'

- name: Install Claude Code CLI globally
  npm:
    name: "@anthropic-ai/claude-code"
    global: true
    state: present

- name: Install Claude Code UI globally
  npm:
    name: "@siteboon/claude-code-ui"
    global: true
    state: present
  notify: restart cloudcli

- name: Create environment file
  template:
    src: cloudcli.env.j2
    dest: "{{ cloudcli_directory }}/.env"
    owner: "{{ cloudcli_user }}"
    group: "{{ cloudcli_user }}"
    mode: '0600'
  notify: restart cloudcli

- name: Create systemd service
  template:
    src: cloudcli.service.j2
    dest: /etc/systemd/system/cloudcli.service
    mode: '0644'
  notify: restart cloudcli

- name: Enable and start cloudcli service
  systemd:
    name: cloudcli
    enabled: true
    state: started
    daemon_reload: true

- name: Create workspace directory
  file:
    path: "/home/{{ cloudcli_user }}/workspace"
    state: directory
    owner: "{{ cloudcli_user }}"
    group: "{{ cloudcli_user }}"
    mode: '0755'

- name: Create output directory for generated files
  file:
    path: "/home/{{ cloudcli_user }}/workspace/output"
    state: directory
    owner: "{{ cloudcli_user }}"
    group: "{{ cloudcli_user }}"
    mode: '0755'

- name: Create problems directory for knowledge base
  file:
    path: "/home/{{ cloudcli_user }}/workspace/problems"
    state: directory
    owner: "{{ cloudcli_user }}"
    group: "{{ cloudcli_user }}"
    mode: '0755'

- name: Deploy CLAUDE.md to workspace
  template:
    src: CLAUDE.md.j2
    dest: "/home/{{ cloudcli_user }}/workspace/CLAUDE.md"
    owner: "{{ cloudcli_user }}"
    group: "{{ cloudcli_user }}"
    mode: '0644'

- name: Deploy problem/solution files
  copy:
    src: "problems/"
    dest: "/home/{{ cloudcli_user }}/workspace/problems/"
    owner: "{{ cloudcli_user }}"
    group: "{{ cloudcli_user }}"
    mode: '0644'

- name: Deploy source Excel/PDF files
  copy:
    src: "source-files/"
    dest: "/home/{{ cloudcli_user }}/workspace/source-files/"
    owner: "{{ cloudcli_user }}"
    group: "{{ cloudcli_user }}"
    mode: '0644'

- name: Install Python Excel tooling via uv
  become_user: "{{ cloudcli_user }}"
  shell: |
    cd /home/{{ cloudcli_user }}/workspace
    uv init --no-readme --name excel-tools 2>/dev/null || true
    uv add openpyxl pandas xlsxwriter
  args:
    creates: "/home/{{ cloudcli_user }}/workspace/pyproject.toml"

- name: Allow cloudcli port from main VPS only
  ufw:
    rule: allow
    port: "{{ cloudcli_port }}"
    proto: tcp
    from_ip: "{{ main_vps_ip }}"
    comment: "Claude Code UI from main VPS"
