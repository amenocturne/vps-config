---
- name: Create briefing directory
  file:
    path: "{{ briefing_dir }}"
    state: directory
    mode: '0755'

- name: Deploy briefing docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ briefing_dir }}/docker-compose.yml"
    mode: '0644'
  notify: restart briefing

- name: Start briefing
  community.docker.docker_compose_v2:
    project_src: "{{ briefing_dir }}"
    state: present
