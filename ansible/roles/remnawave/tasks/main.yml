---
- name: Create remnawave system user
  user:
    name: "{{ remnawave_user }}"
    system: yes
    create_home: yes
    shell: /bin/bash
    state: present

- name: Add remnawave user to docker group
  user:
    name: "{{ remnawave_user }}"
    groups: docker
    append: yes

- name: Create remnawave directory
  file:
    path: "{{ remnawave_directory }}"
    state: directory
    owner: "{{ remnawave_user }}"
    group: "{{ remnawave_user }}"
    mode: '0755'

- name: Download docker-compose-prod.yml
  get_url:
    url: https://raw.githubusercontent.com/remnawave/backend/refs/heads/main/docker-compose-prod.yml
    dest: "{{ remnawave_directory }}/docker-compose.yml"
    owner: "{{ remnawave_user }}"
    group: "{{ remnawave_user }}"
    mode: '0644'

- name: Modify docker-compose to bind to all interfaces (for remote reverse proxy)
  replace:
    path: "{{ remnawave_directory }}/docker-compose.yml"
    regexp: "127\\.0\\.0\\.1:3000:3000"
    replace: "0.0.0.0:3000:3000"

- name: Create certificates directory for panel
  file:
    path: "{{ remnawave_directory }}/certs"
    state: directory
    owner: "{{ remnawave_user }}"
    group: "{{ remnawave_user }}"
    mode: '0755'

# Load node inventory to get all node IPs
- name: Load nodes inventory
  include_vars:
    file: "{{ playbook_dir }}/../inventories/nodes.yml"
    name: nodes_inventory
  ignore_errors: true

- name: Extract node IPs from inventory
  set_fact:
    node_hosts: "{{ nodes_inventory.all.children.remnawave_nodes.hosts | dict2items | map(attribute='value.ansible_host') | list }}"
  when: nodes_inventory is defined

- name: Extract SSL certificates from all running nodes
  shell: |
    echo "" | timeout 5 openssl s_client -connect {{ item }}:{{ remnawave_node_app_port | default('2222') }} -showcerts 2>/dev/null | \
    awk '/BEGIN CERTIFICATE/,/END CERTIFICATE/{print}' | \
    awk '/BEGIN CERTIFICATE/,/END CERTIFICATE/{cert=cert$0"\n"}/END CERTIFICATE/{if(length(cert)>0){print cert; exit}; cert=""}'
  register: node_certs_extracted
  delegate_to: localhost
  become: false
  changed_when: false
  failed_when: false
  loop: "{{ node_hosts | default([]) }}"
  when: node_hosts is defined and node_hosts | length > 0

- name: Create temporary CA bundle file locally
  copy:
    content: |
      # Remnawave Node CA Bundle
      # Auto-generated from running nodes
      # Generated: {{ ansible_date_time.iso8601 }}
      {% for result in node_certs_extracted.results %}
      {% if result.stdout | length > 0 %}
      # Node: {{ result.item }}
      {{ result.stdout }}
      {% endif %}
      {% endfor %}
    dest: "/tmp/remnawave-nodes-ca.pem"
  delegate_to: localhost
  become: false
  when: 
    - node_certs_extracted is defined
    - node_certs_extracted.results | selectattr('stdout', 'defined') | selectattr('stdout') | list | length > 0

- name: Copy CA bundle to panel server
  copy:
    src: "/tmp/remnawave-nodes-ca.pem"
    dest: "{{ remnawave_directory }}/certs/remnawave-nodes-ca.pem"
    owner: "{{ remnawave_user }}"
    group: "{{ remnawave_user }}"
    mode: '0644'
  when: 
    - node_certs_extracted is defined
    - node_certs_extracted.results | selectattr('stdout', 'defined') | selectattr('stdout') | list | length > 0

- name: Count successfully extracted certificates
  set_fact:
    certs_extracted_count: "{{ node_certs_extracted.results | selectattr('stdout', 'defined') | selectattr('stdout') | list | length }}"
  when: node_certs_extracted is defined

- name: Verify node certificates were extracted
  assert:
    that:
      - node_certs_extracted is defined
      - certs_extracted_count | default(0) | int > 0
    fail_msg: |
      ================================================================================
      ❌ ERROR: Cannot extract SSL certificates from VPN nodes!
      ================================================================================
      
      The panel REQUIRES valid SSL certificates from all nodes to establish
      secure TLS connections on port 2222.
      
      TROUBLESHOOTING:
      ----------------
      1. Ensure nodes are deployed and running:
         just deploy-nodes
         just ssh-nodes "docker ps | grep remnanode"
      
      2. Verify nodes are listening on port 2222:
         just ssh-nodes "ss -tlnp | grep :2222"
      
      3. Check network connectivity from control machine:
      {% if node_hosts is defined %}
      {% for host in node_hosts %}
         nc -zv {{ host }} 2222
      {% endfor %}
      {% endif %}
      
      4. Verify firewall allows port 2222:
         just ssh-nodes "sudo ufw status | grep 2222"
      
      5. If nodes are behind NAT/firewall, you may need to:
         - Temporarily open port 2222 during deployment
         - Or manually extract certificates and place in inventory
      
      MANUAL CERTIFICATE EXTRACTION:
      -------------------------------
      Run on each node:
         openssl s_client -connect 127.0.0.1:2222 -showcerts < /dev/null 2>/dev/null | \
         openssl x509 > node-X-cert.pem
      
      Then combine all certificates:
         cat node-*-cert.pem > {{ inventory_dir }}/node-ca-bundle.pem
      
      And copy to panel manually.
      ================================================================================

- name: Add certificate volume mount to remnawave service
  blockinfile:
    path: "{{ remnawave_directory }}/docker-compose.yml"
    marker: "    # {mark} ANSIBLE MANAGED - Certificate mount for node TLS verification"
    insertafter: "    container_name: remnawave"
    block: |2
          volumes:
            - {{ remnawave_directory }}/certs/remnawave-nodes-ca.pem:/etc/ssl/certs/remnawave-nodes-ca.pem:ro

- name: Display certificate configuration status
  debug:
    msg: |
      ✅ Node SSL certificates configured successfully
      
      Certificates extracted from {{ certs_extracted_count }} nodes
      CA Bundle: {{ remnawave_directory }}/certs/remnawave-nodes-ca.pem
      
      The panel will use secure TLS connections to all nodes on port 2222.

- name: Check if secrets file exists
  stat:
    path: "{{ inventory_dir }}/.secrets.yml"
  register: secrets_file
  delegate_to: localhost
  become: false

- name: Load persistent secrets from inventory
  include_vars:
    file: "{{ inventory_dir }}/.secrets.yml"
  when: secrets_file.stat.exists

- name: Deploy .env configuration file
  template:
    src: env.j2
    dest: "{{ remnawave_directory }}/.env"
    owner: "{{ remnawave_user }}"
    group: "{{ remnawave_user }}"
    mode: '0600'
  register: env_file

- name: Stop existing Remnawave containers if .env changed
  community.docker.docker_compose_v2:
    project_src: "{{ remnawave_directory }}"
    state: absent
  become_user: "{{ remnawave_user }}"
  when: env_file.changed
  ignore_errors: true

- name: Start Remnawave with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ remnawave_directory }}"
    state: present
  become_user: "{{ remnawave_user }}"

- name: Configure firewall - Allow panel access from main server
  ufw:
    rule: allow
    port: "{{ remnawave_app_port }}"
    from_ip: "{{ main_server_ip }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Configure firewall - Allow panel access from localhost
  ufw:
    rule: allow
    port: "{{ remnawave_app_port }}"
    from_ip: 127.0.0.1
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Configure firewall - Deny all other access to panel port
  ufw:
    rule: deny
    port: "{{ remnawave_app_port }}"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Configure firewall - Block external access to metrics port
  ufw:
    rule: deny
    port: "{{ remnawave_metrics_port }}"
    from_ip: any
  when: ansible_os_family == "Debian"

- name: Configure firewall - Block external access to database port
  ufw:
    rule: deny
    port: "{{ remnawave_db_port }}"
    from_ip: any
  when: ansible_os_family == "Debian"

# Caddy setup for local proxying
- name: Create caddy directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/caddy
    - /opt/caddy/config
    - /opt/caddy/data

- name: Generate Caddyfile for Remnawave
  template:
    src: ../../caddy/templates/Caddyfile-remnawave.j2
    dest: /opt/caddy/Caddyfile
    mode: '0644'
  register: caddyfile

- name: Start Caddy container
  community.docker.docker_container:
    name: caddy
    image: caddy:latest
    state: started
    restart_policy: unless-stopped
    ports:
      - "80:80"
    volumes:
      - /opt/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /opt/caddy/data:/data
      - /opt/caddy/config:/config
    networks:
      - name: remnawave-network

- name: Restart Caddy if config changed
  community.docker.docker_container:
    name: caddy
    state: started
    restart: yes
  when: caddyfile.changed

- name: Configure firewall - Allow HTTP traffic
  ufw:
    rule: allow
    port: "80"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Configure firewall - Allow HTTPS traffic
  ufw:
    rule: allow
    port: "443"
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Configure firewall - Allow HTTP/3 (QUIC)
  ufw:
    rule: allow
    port: "443"
    proto: udp
  when: ansible_os_family == "Debian"


# Create default inbound configuration
- name: Create default inbound configuration
  include_tasks: create_inbound.yml
  when: remnawave_create_default_inbound | default(false)
  tags: ['inbound', 'always']
