---
- name: Create send directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ send_dir }}"
    - "{{ send_dir }}/uploads"

- name: Deploy send docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ send_dir }}/docker-compose.yml"
    mode: '0644'
  notify: restart send

- name: Start send
  community.docker.docker_compose_v2:
    project_src: "{{ send_dir }}"
    state: present
