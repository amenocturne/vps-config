---
- name: Create navidrome directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ navidrome_dir }}"
    - "{{ navidrome_dir }}/data"

- name: Deploy navidrome docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ navidrome_dir }}/docker-compose.yml"
    mode: '0644'
  notify: restart navidrome

- name: Start navidrome
  community.docker.docker_compose_v2:
    project_src: "{{ navidrome_dir }}"
    state: present
