---
- name: restart minecraft
  community.docker.docker_compose_v2:
    project_src: "{{ minecraft_dir }}"
    state: restarted

- name: rebuild mc-panel image
  ansible.builtin.command:
    cmd: docker compose build mc-panel
    chdir: "{{ minecraft_dir }}"
  listen: rebuild mc-panel

- name: recreate mc-panel container
  ansible.builtin.command:
    cmd: docker compose up -d --force-recreate mc-panel
    chdir: "{{ minecraft_dir }}"
  listen: rebuild mc-panel
