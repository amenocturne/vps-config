---
- name: Create xray-portal directory
  file:
    path: "{{ xray_portal_dir }}"
    state: directory
    mode: '0755'

- name: Deploy xray-portal config
  template:
    src: config.json.j2
    dest: "{{ xray_portal_dir }}/config.json"
    mode: '0644'
  notify: restart xray-portal

- name: Deploy xray-portal docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ xray_portal_dir }}/docker-compose.yml"
    mode: '0644'
  notify: restart xray-portal

- name: Start xray-portal
  community.docker.docker_compose_v2:
    project_src: "{{ xray_portal_dir }}"
    state: present

- name: Allow tunnel interconnect port
  ufw:
    rule: allow
    port: "{{ xray_portal_interconnect_port }}"
    proto: tcp
    comment: "Xray tunnel interconnect"

- name: Allow SSH tunnel port
  ufw:
    rule: allow
    port: "{{ xray_portal_ssh_port }}"
    proto: tcp
    comment: "SSH tunnel to home server"

- name: Allow Minecraft game port
  ufw:
    rule: allow
    port: "25565"
    proto: tcp
    comment: "Minecraft game server (tunneled to home)"

- name: Allow Minecraft RCON from remnawave
  ufw:
    rule: allow
    port: "25575"
    proto: tcp
    from_ip: "{{ remnawave_server_ip }}"
    comment: "Minecraft RCON (from remnawave bot only)"

- name: Allow Minecraft manager from remnawave
  ufw:
    rule: allow
    port: "8585"
    proto: tcp
    from_ip: "{{ remnawave_server_ip }}"
    comment: "Minecraft world manager (from remnawave bot only)"
