---
# Remnawave Node default configuration
remnawave_node_directory: "/opt/remnanode"
remnawave_node_app_port: 2222
remnawave_node_log_directory: "/var/lib/remnanode"
remnawave_node_certs_directory: "/opt/remnanode/certs"

# VPN Protocol ports
remnawave_node_reality_port: 443    # VLESS + Reality (primary)
remnawave_node_ws_port: 8443        # VLESS + WebSocket + TLS (via Cloudflare CDN)
remnawave_node_shadowsocks_port: 8388

# Reality configuration (ASN-safe destination)
reality_dest: "search.brave.com:443"  # ASN-neutral destination
reality_server_names:
  - "search.brave.com"

# Hysteria 2 (UDP, QUIC-based)
remnawave_node_hysteria2_port: 443
remnawave_node_enable_hysteria2: false

# SECRET_KEY (must be obtained from Remnawave Panel)
# This MUST be set in inventory secrets file (ansible/inventories/.secrets.yml)
# NEVER commit actual secret keys to git!
remnawave_node_secret_key: ""

# Reality keys (generate with: docker run --rm teddysun/xray:latest xray x25519)
# Add these to your inventory secrets file
reality_private_key: ""  # Server uses this (PrivateKey from x25519 output)
reality_public_key: ""   # Client uses this (Public key - must be derived or generated separately)
reality_short_id: ""     # Generate with: openssl rand -hex 8
