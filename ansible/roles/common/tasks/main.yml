---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: Install essential packages
  apt:
    name: "{{ essential_packages }}"
    state: present

- name: Set timezone
  shell: timedatectl set-timezone "{{ system_timezone }}"
  changed_when: false
  failed_when: false

- name: Create directories for services
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ base_directory }}"
    - "{{ logs_directory }}"

- name: Create deployment user
  user:
    name: "{{ deployment_user }}"
    shell: /bin/bash
    create_home: yes
  when: not (skip_user_setup | default(false))

- name: Setup SSH directory for deployment user
  file:
    path: "/home/{{ deployment_user }}/.ssh"
    state: directory
    owner: "{{ deployment_user }}"
    group: "{{ deployment_user }}"
    mode: '0700'
  when: not (skip_user_setup | default(false))

- name: Add SSH public key for deployment user
  authorized_key:
    user: "{{ deployment_user }}"
    key: "{{ deployment_user_ssh_key }}"
    state: present
  when: not (skip_user_setup | default(false)) and deployment_user_ssh_key != ""

- name: Configure sudo access for deployment user
  copy:
    content: "{{ sudoers_rule | default(deployment_user + ' ALL=(ALL) NOPASSWD: /usr/bin/docker') }}\n"
    dest: "/etc/sudoers.d/{{ deployment_user }}"
    mode: '0440'
    validate: 'visudo -cf %s'
  when: not (skip_user_setup | default(false))