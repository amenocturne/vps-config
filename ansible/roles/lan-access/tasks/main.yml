---
# mDNS — advertise as <hostname>.local on LAN
# macOS resolves .local natively via Bonjour

- name: Install avahi-daemon
  apt:
    name: avahi-daemon
    state: present

- name: Set avahi hostname
  lineinfile:
    path: /etc/avahi/avahi-daemon.conf
    regexp: '^#?host-name='
    line: "host-name={{ lan_hostname }}"
    insertafter: '^\[server\]'
  notify: restart avahi

- name: Enable and start avahi-daemon
  systemd:
    name: avahi-daemon
    state: started
    enabled: yes

# Split DNS — resolve *.home_domain to local IP
# LAN clients query this server for home domains, get local IP.
# When away, the resolver falls back to public DNS → VPS tunnel.

- name: Install dnsmasq
  apt:
    name: dnsmasq
    state: present

- name: Remove ubuntu-fan dnsmasq config (conflicts with our config)
  file:
    path: /etc/dnsmasq.d/ubuntu-fan
    state: absent
  notify: restart dnsmasq

- name: Configure dnsmasq for split DNS
  template:
    src: dnsmasq-home.conf.j2
    dest: /etc/dnsmasq.d/home-services.conf
    mode: '0644'
  notify: restart dnsmasq

- name: Remove dnsmasq systemd override if present
  file:
    path: /etc/systemd/system/dnsmasq.service.d
    state: absent
  notify:
    - daemon-reload
    - restart dnsmasq

- name: Flush handlers before starting dnsmasq
  meta: flush_handlers

- name: Enable and start dnsmasq
  systemd:
    name: dnsmasq
    state: started
    enabled: yes
    daemon_reload: yes

# Source-based policy routing — ensures DNS (and all) responses from the WiFi IP
# go back via the WiFi interface, even when an Ethernet NIC has a lower metric.
# Without this, the kernel routes responses via Ethernet and clients never see them.

- name: Add routing table for WiFi source routing
  lineinfile:
    path: /etc/iproute2/rt_tables
    regexp: '^100\s'
    line: "100 wifi_src"

- name: Create lan-access directory
  file:
    path: /opt/lan-access
    state: directory
    mode: '0755'

- name: Deploy source routing script
  template:
    src: source-routing.sh.j2
    dest: /opt/lan-access/source-routing.sh
    mode: '0755'

- name: Deploy source routing systemd service
  copy:
    content: |
      [Unit]
      Description=Source-based routing for WiFi interface
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/opt/lan-access/source-routing.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/lan-source-routing.service
    mode: '0644'
  notify: daemon-reload

- name: Flush handlers
  meta: flush_handlers

- name: Enable and start source routing
  systemd:
    name: lan-source-routing
    state: restarted
    enabled: yes
    daemon_reload: yes

# Firewall

- name: Allow mDNS through firewall
  ufw:
    rule: allow
    port: "5353"
    proto: udp
    comment: "mDNS (LAN discovery)"

- name: Allow DNS from LAN (UDP)
  ufw:
    rule: allow
    port: "53"
    proto: udp
    src: "{{ lan_subnet }}"
    comment: "DNS (split DNS for home services)"

- name: Allow DNS from LAN (TCP)
  ufw:
    rule: allow
    port: "53"
    proto: tcp
    src: "{{ lan_subnet }}"
    comment: "DNS (split DNS for home services)"

- name: Allow home app ports from LAN
  ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: tcp
    src: "{{ lan_subnet }}"
    comment: "LAN - {{ item.name }}"
  loop: "{{ home_apps }}"
  when: home_apps is defined
