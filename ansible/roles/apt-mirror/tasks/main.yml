---
# Switch Ubuntu apt sources to Yandex mirror for faster downloads in Russia

- name: Replace ru.archive.ubuntu.com with mirror.yandex.ru
  replace:
    path: /etc/apt/sources.list.d/ubuntu.sources
    regexp: 'ru\.archive\.ubuntu\.com'
    replace: 'mirror.yandex.ru'
  notify: apt update

- name: Replace security.ubuntu.com with mirror.yandex.ru
  replace:
    path: /etc/apt/sources.list.d/ubuntu.sources
    regexp: 'security\.ubuntu\.com'
    replace: 'mirror.yandex.ru'
  notify: apt update
