---
- name: Fail if no admin keys configured
  fail:
    msg: "soft_serve_admin_keys is empty — add at least one SSH pubkey to secrets.yml"
  when: soft_serve_admin_keys | default([]) | length == 0

- name: Create soft-serve directories
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ soft_serve_dir }}"
    - "{{ soft_serve_dir }}/data"

- name: Deploy soft-serve docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ soft_serve_dir }}/docker-compose.yml"
    mode: '0644'
  notify: restart soft-serve

- name: Start soft-serve
  community.docker.docker_compose_v2:
    project_src: "{{ soft_serve_dir }}"
    state: present
