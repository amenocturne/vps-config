---
# Configure MacBook Pro 2017 running Ubuntu 24.04 as home server

- name: Configure Home Server
  hosts: home_server
  become: true
  vars_files:
    - "{{ playbook_dir }}/../../secrets.yml"
  roles:
    - apt-mirror
    - macbook-console
    - common
    - security
    - { role: lan-access, tags: ['lan'] }
    - { role: xray-bridge, tags: ['tunnel'] }
    - { role: radicale, tags: ['radicale'] }
    - { role: dwayne, tags: ['dwayne'] }
    - { role: jellyfin, tags: ['jellyfin'] }
    - { role: navidrome, tags: ['navidrome'] }
    - { role: webdav, tags: ['webdav'] }
    - { role: send, tags: ['send'] }
    - { role: minecraft, tags: ['minecraft'] }
    - role: monitoring-agent
      tags: ['monitoring']
      vars:
        monitoring_firewall_rule: false
        cadvisor_port: 8081
