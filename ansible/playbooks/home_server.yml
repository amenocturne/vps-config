---
# Configure MacBook Pro 2017 running Ubuntu 24.04 as home server

- name: Configure Home Server
  hosts: home_server
  become: true
  vars_files:
    - "{{ inventory_dir }}/tunnel-secrets.yml"
  roles:
    - apt-mirror
    - macbook-console
    - common
    - security
    - { role: xray-bridge, tags: ['tunnel'] }
