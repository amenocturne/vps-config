---
- name: Configure Remnawave VPN Server
  hosts: remnawave
  become: true
  vars_files:
    - "{{ playbook_dir }}/../../secrets.yml"
  roles:
    - { role: common, tags: ['common'] }
    - { role: security, tags: ['security'] }
    - { role: docker, tags: ['docker'] }
    - { role: remnawave, tags: ['remnawave', 'panel'] }
    - { role: remnawave-subscription-page, tags: ['remnawave-subscription', 'subscription'] }
    - { role: remnawave-telegram-bot, tags: ['remnawave-telegram-bot', 'telegram-bot'] }
    - { role: monitoring-agent, tags: ['monitoring'] }
