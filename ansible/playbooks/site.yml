    - { role: coturn, tags: ['coturn'] }
    - { role: briefing, tags: ['briefing'] }
    - { role: xray-portal, tags: ['tunnel'] }
    - { role: dashboard, tags: ['dashboard'] }
    - { role: caddy, tags: ['caddy'] }
    - { role: monitoring, tags: ['monitoring'] }